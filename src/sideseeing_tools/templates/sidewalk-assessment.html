<div id="sidewalk-assessment-section" class="section-content max-w-7xl mx-auto space-y-8" data-map-id="sidewalk-assessment-map">
    <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
            <div>
                <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                    <i data-lucide="cpu" class="text-emerald-500" size="20"></i>
                    Sidewalk Assessment
                </h2>
                <p class="text-sm text-gray-500 mt-1">Sidewalk evaluation across all samples.</p>
            </div>
            <div class="flex items-center gap-2">
                {% if sections.analysis %}
                    <label for="sidewalk-assessment-sample-selector" class="text-sm font-medium text-gray-700">Sample:</label>
                    <select id="sidewalk-assessment-sample-selector" class="w-auto bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2">
                        {# Options will be populated by JavaScript #}
                    </select>
                {% endif %}
            </div>
        </div>
        <div id="sidewalk-assessment-map-wrapper" class="relative bg-gray-100 rounded-b-xl h-[500px]">
            <div id="sidewalk-assessment-map" class="w-full h-full rounded-lg z-10 flex items-center justify-center"></div>
        </div>
    </section>
</div>
